<!DOCTYPE html>
<html>
<head>
    <title>PinTheMap</title>
    <meta charset="utf-8">
    <!-- Стили Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Общие стили страницы */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background: #f0f0f0;
        }

        /* Шапка и подвал – на всю ширину */
        .header, .footer {
            text-align: center;
            padding: 10px;
            background: #ddd;
            width: 100%;
            box-sizing: border-box;
        }

        /* Контейнер для трёх колонок */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 100px;
            width: 100%;
            max-width: 1920px;
            margin: 0 auto;
            padding: 20px 0;
            box-sizing: border-box;
        }

        /* Боковые панели */
        .sidebar {
            width: 200px;
            background: #ddd;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        /* Карта */
        #map {
            width: 1400px;
            height: 700px;
            border: 2px solid #333;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        /* Дополнительный стиль для вывода координат */
        #coords-display {
            margin-top: 15px;
            padding: 10px;
            background: #eee;
            border-radius: 5px;
            font-family: monospace;
            word-break: break-word;
        }

        .sidebar h3 {
            margin-top: 0;
        }
        .sidebar button {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }
        .sidebar ul {
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <!-- Шапка -->
    <div class="header">
        <h2>Игра и все такое</h2>
        <p>Здесь может быть ваша реклама</p>
    </div>

    <!-- Основной контейнер с тремя колонками -->
    <div class="container">
        <!-- Левая панель -->
        <div class="sidebar">
            <h3>Левое меню</h3>
            <p>Кнопки управления, счётчики, информация.</p>
            <button onclick="alert('Кнопка слева')">Действие 1</button>
            <button onclick="alert('Ещё кнопка')">Действие 2</button>
        </div>

        <!-- Карта -->
        <div id="map"></div>

        <!-- Правая панель (с выводом координат) -->
        <div class="sidebar">
            <h3>Правая панель</h3>
            <p>Список точек:</p>
            <ul>
                <li>Кремль</li>
                <li>Эрмитаж</li>
                <li>Уфа</li>
            </ul>
            <!-- Блок для отображения координат клика -->
            <div id="coords-display">
                Нажмите на карту, чтобы увидеть координаты
            </div>
        </div>
    </div>

    <!-- Подвал -->
    <div class="footer">
        <p>Дополнительная панель снизу</p>
    </div>

    <!-- Подключаем Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Создаём карту
        let map = L.map('map', {
            attributionControl: false
        }).setView([55.75, 37.62], 5);   // центр и масштаб

        // Слой без подписей
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            subdomains: 'abcd'
        }).addTo(map);

        // Точки (пример)
        let points = [
            { coords: [55.75, 37.62], name: 'Кремль' },
            { coords: [59.93, 30.36], name: 'Эрмитаж' },
            { coords: [54.73, 55.97], name: 'Уфа' }
        ];

        points.forEach(point => {
            L.marker(point.coords).addTo(map).bindPopup(point.name);
        });

        // *** Добавленный обработчик клика на карту ***
        map.on('click', function(e) {
            // Получаем координаты места клика
            let lat = e.latlng.lat.toFixed(5);   // широта с 5 знаками
            let lng = e.latlng.lng.toFixed(5);   // долгота с 5 знаками
            // Формируем строку
            let coordsText = 'Координаты: ' + lat + ', ' + lng;
            // Выводим в блок правой панели
            document.getElementById('coords-display').innerText = coordsText;
        });
    </script>

</body>
</html>
